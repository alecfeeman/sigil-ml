# OpenAPI contract extensions for Cloud Serving Mode
# These describe changes and additions to the existing sigil-ml API
# when running in cloud mode (--mode cloud).

openapi: "3.1.0"
info:
  title: sigil-ml Cloud Mode API Extensions
  version: "0.2.0"
  description: |
    Extensions to the sigil-ml API for cloud (stateless, multi-tenant) serving.
    All existing endpoints remain; this document describes behavioral changes
    and new fields when mode=cloud.

# ---------------------------------------------------------------------------
# Shared components
# ---------------------------------------------------------------------------
components:
  headers:
    X-Tenant-ID:
      description: |
        Tenant identifier set by the upstream API gateway.
        Required on all /predict/* endpoints in cloud mode.
        Ignored in local mode.
      required: true
      schema:
        type: string
        minLength: 1
        example: "tenant-abc-123"

  schemas:
    HealthResponse:
      type: object
      required: [status, models, uptime_sec]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        mode:
          type: string
          enum: [local, cloud]
          description: "Operating mode. New optional field."
        models:
          type: object
          additionalProperties:
            type: string
            enum: [ready, untrained, not_loaded]
        uptime_sec:
          type: number
          format: float

    CloudStatusResponse:
      type: object
      properties:
        mode:
          type: string
          enum: [cloud]
        cache_stats:
          type: object
          properties:
            hits:
              type: integer
            misses:
              type: integer
            evictions:
              type: integer
            size:
              type: integer
            max_size:
              type: integer
            ttl_seconds:
              type: number
        loaded_tenants:
          type: array
          items:
            type: object
            properties:
              tenant_id:
                type: string
              models:
                type: array
                items:
                  type: string
        request_counts:
          type: object
          additionalProperties:
            type: integer
          description: "Per-tenant request counts since startup."

    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string

# ---------------------------------------------------------------------------
# Cloud-mode endpoint behavioral changes
# ---------------------------------------------------------------------------
paths:
  /health:
    get:
      summary: Health check (extended for cloud mode)
      description: |
        In cloud mode, response includes `mode: "cloud"` and model availability
        reflects cache state rather than local model loading.
        In local mode, behavior is unchanged (backward compatible).
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /status:
    get:
      summary: Service status (cloud-aware)
      description: |
        In cloud mode, returns cache statistics and loaded tenant info.
        Does NOT query SQLite.
        In local mode, behavior is unchanged.
      responses:
        "200":
          description: Status information
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CloudStatusResponse"
                  - description: "Local mode response (unchanged)"

  /predict/stuck:
    post:
      summary: Stuck prediction (cloud mode requires features + tenant header)
      parameters:
        - in: header
          name: X-Tenant-ID
          required: true
          schema:
            type: string
      description: |
        Cloud mode: X-Tenant-ID header required. Features must be provided
        in request body. task_id-only requests return 400.
        Local mode: unchanged.
      responses:
        "200":
          description: Prediction result
        "400":
          description: "task_id provided without features in cloud mode"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Missing X-Tenant-ID header in cloud mode"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /predict/suggest:
    post:
      summary: Workflow state prediction (cloud mode requires classified_events)
      parameters:
        - in: header
          name: X-Tenant-ID
          required: true
          schema:
            type: string
      description: |
        Cloud mode: X-Tenant-ID header required. classified_events must be
        provided in request body (no poller buffer available).
        Local mode: unchanged.
      responses:
        "200":
          description: Workflow state prediction
        "401":
          description: "Missing X-Tenant-ID header in cloud mode"

  /predict/duration:
    post:
      summary: Duration estimation (cloud mode requires features + tenant header)
      parameters:
        - in: header
          name: X-Tenant-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Duration estimate
        "400":
          description: "task_id without features in cloud mode"
        "401":
          description: "Missing X-Tenant-ID header in cloud mode"

  /predict/quality:
    post:
      summary: Quality score (cloud mode requires features + tenant header)
      parameters:
        - in: header
          name: X-Tenant-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quality score
        "401":
          description: "Missing X-Tenant-ID header in cloud mode"

  /train:
    post:
      summary: Trigger model training (disabled in cloud mode)
      description: |
        Returns 405 Method Not Allowed in cloud mode.
        Local mode: unchanged.
      responses:
        "200":
          description: Training started (local mode only)
        "405":
          description: "Training not available in cloud mode"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
